<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Network Forensic Pipeline{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <span class="nav-icon">&#128269;</span>
      <span>NetForensic</span>
    </div>
    <ul class="nav-links">
      <li><a href="{{ url_for('upload_page') }}" class="{% if request.endpoint == 'upload_page' %}active{% endif %}">
        <span>&#128196;</span> Upload
      </a></li>
      <li><a href="{{ url_for('pipeline_page') }}" class="{% if request.endpoint == 'pipeline_page' %}active{% endif %}">
        <span>&#9654;</span> Pipeline
      </a></li>
      <li><a href="{{ url_for('metrics_page') }}" class="{% if request.endpoint == 'metrics_page' %}active{% endif %}">
        <span>&#128202;</span> Metrics
      </a></li>
      <li><a href="{{ url_for('results_page') }}" class="{% if request.endpoint in ('results_page', 'result_detail_page') %}active{% endif %}">
        <span>&#128220;</span> Results
      </a></li>
      <li><a href="{{ url_for('master_page') }}" class="{% if request.endpoint == 'master_page' %}active{% endif %}">
        <span>&#128736;</span> Master Report
      </a></li>
    </ul>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
